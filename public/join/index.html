<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Vote — Charity Poll</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #e85d04;
      --accent:  #f48c06;
      --bg:      #fff8f0;
      --dark:    #2d3250;
      --muted:   #6b7280;
      --border:  #e5e7eb;
      --success: #2d9d5f;
      --radius:  14px;
    }

    html, body {
      height: 100%; background: var(--bg);
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      color: var(--dark);
    }
    body { display: flex; flex-direction: column; min-height: 100%; min-height: 100dvh; }

    /* ── Header ──────────────────────────────────────────────────────────── */
    .app-header {
      background: var(--dark); color: #fff;
      padding: .75rem 1.25rem;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .app-header .brand { display: flex; align-items: center; gap: .6rem; }
    #header-logo { max-height: 30px; border-radius: 4px; display: none; }
    #event-name  { font-size: .95rem; font-weight: 700; }
    .room-chip   { font-size: .75rem; background: rgba(255,255,255,.15); padding: .2rem .6rem; border-radius: 99px; }

    /* ── Main ────────────────────────────────────────────────────────────── */
    main {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 1.5rem 1rem 2rem;
    }

    /* ── Code entry screen ───────────────────────────────────────────────── */
    #screen-code { width: 100%; max-width: 360px; text-align: center; }
    #screen-code h1 { font-size: 1.6rem; margin-bottom: .5rem; }
    #screen-code p  { color: var(--muted); margin-bottom: 1.5rem; font-size: .95rem; }

    #code-input {
      width: 100%; padding: 1rem;
      border: 2px solid var(--border); border-radius: var(--radius);
      font-size: 1.5rem; text-align: center; letter-spacing: .2em;
      text-transform: uppercase; outline: none; margin-bottom: 1rem;
    }
    #code-input:focus { border-color: var(--primary); }
    #code-error { color: #dc2626; font-size: .85rem; margin-bottom: .5rem; min-height: 1.25rem; }

    .btn-join {
      width: 100%; background: var(--primary); color: #fff;
      border: none; padding: 1rem; border-radius: var(--radius);
      font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: opacity .2s;
    }
    .btn-join:hover { opacity: .88; }

    /* ── Waiting screen ──────────────────────────────────────────────────── */
    #screen-waiting { text-align: center; max-width: 320px; }
    .pulse-icon { font-size: 3.5rem; margin-bottom: 1rem; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
    #screen-waiting h2 { font-size: 1.4rem; margin-bottom: .5rem; }
    #screen-waiting p  { color: var(--muted); font-size: .95rem; line-height: 1.5; }

    /* ── Question screen ─────────────────────────────────────────────────── */
    #screen-question { width: 100%; max-width: 480px; }
    .q-progress { font-size: .75rem; color: var(--muted); margin-bottom: .75rem; text-align: center; }
    #question-title { font-size: 1.25rem; font-weight: 700; text-align: center; margin-bottom: 1.5rem; line-height: 1.35; color: var(--dark); }

    #options-list { display: flex; flex-direction: column; gap: .65rem; }
    .option-btn {
      width: 100%; padding: 1rem 1.25rem;
      border: 2.5px solid var(--border); border-radius: var(--radius); background: #fff;
      font-size: 1rem; font-weight: 600; text-align: left; cursor: pointer; transition: all .2s;
      display: flex; align-items: center; gap: .75rem; color: var(--dark); line-height: 1.3;
    }
    .option-btn:hover:not(:disabled) { border-color: var(--primary); background: #fff4ee; transform: translateY(-1px); }
    .option-btn.selected { border-color: var(--primary); background: var(--primary); color: #fff; }
    .option-btn:disabled:not(.selected) { opacity: .45; cursor: not-allowed; }
    .option-btn .check-icon { font-size: 1.1rem; flex-shrink: 0; }

    .vote-feedback {
      margin-top: 1.25rem; text-align: center; font-size: .9rem;
      color: var(--success); font-weight: 600; min-height: 1.25rem; transition: opacity .3s;
    }
    .vote-feedback.hidden { opacity: 0; }
    .locked-badge-inline {
      display: inline-block; margin-top: .75rem;
      background: #7c3aed; color: #fff; font-size: .75rem;
      padding: .25rem .75rem; border-radius: 99px; font-weight: 700;
      text-align: center; width: 100%;
    }

    /* ── Results screen ──────────────────────────────────────────────────── */
    #screen-results { width: 100%; max-width: 480px; }

    .results-progress {
      font-size: .75rem; color: var(--muted); margin-bottom: .4rem; text-align: center;
    }
    .results-q-title {
      font-size: 1.15rem; font-weight: 700; text-align: center;
      margin-bottom: 1.5rem; line-height: 1.35; color: var(--dark);
    }

    .result-row { margin-bottom: .9rem; }
    .result-row-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: .3rem; gap: .5rem;
    }
    .result-label {
      font-size: .88rem; font-weight: 600; color: var(--dark);
      display: flex; align-items: center; gap: .35rem; min-width: 0; flex: 1;
    }
    .result-label .my-check {
      color: var(--primary); font-weight: 900; font-size: 1rem; flex-shrink: 0;
    }
    .result-label .opt-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .result-pct {
      font-size: .85rem; font-weight: 700; color: var(--muted);
      flex-shrink: 0; min-width: 36px; text-align: right;
    }
    .result-track {
      height: 30px; background: #e5e7eb; border-radius: 8px; overflow: hidden;
    }
    .result-fill {
      height: 100%; border-radius: 8px; background: #d1d5db;
      transition: width .65s cubic-bezier(.4,0,.2,1);
      width: 0%;
    }
    .result-fill.my-vote { background: var(--primary); }

    .results-footer {
      margin-top: 1.5rem; display: flex; flex-direction: column; align-items: center; gap: .65rem;
    }
    .results-total { font-size: .82rem; color: var(--muted); }
    .btn-change-vote {
      background: none; border: 2px solid var(--border); border-radius: 99px;
      padding: .45rem 1.5rem; font-size: .88rem; font-weight: 600; color: var(--muted);
      cursor: pointer; transition: all .2s;
    }
    .btn-change-vote:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
    .btn-change-vote:disabled { opacity: .35; cursor: not-allowed; }
    .locked-results-msg {
      font-size: .78rem; color: #7c3aed; font-weight: 600; letter-spacing: .02em;
    }

    /* ── Reconnecting banner ─────────────────────────────────────────────── */
    #reconnect-banner {
      position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
      background: #1f2937; color: #fff; padding: .6rem 1.25rem;
      border-radius: 99px; font-size: .85rem; font-weight: 600;
      display: none; align-items: center; gap: .5rem; z-index: 200;
    }
    #reconnect-banner.visible { display: flex; }
    .spinner {
      width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="app-header">
  <div class="brand">
    <img id="header-logo" alt="logo" />
    <span id="event-name">Charity Poll</span>
  </div>
  <span class="room-chip" id="room-chip" style="display:none">Room <strong id="room-code-display"></strong></span>
</div>

<main>

  <!-- Code entry -->
  <div id="screen-code">
    <h1>Join the Vote</h1>
    <p>Enter the 6-character room code shown on the screen.</p>
    <input type="text" id="code-input" maxlength="6" placeholder="ABC123"
           autocomplete="off" autocorrect="off" spellcheck="false" />
    <p id="code-error"></p>
    <button class="btn-join" id="join-btn">Join →</button>
  </div>

  <!-- Waiting for host -->
  <div id="screen-waiting" style="display:none">
    <div class="pulse-icon">🎉</div>
    <h2>You're in!</h2>
    <p>Waiting for the host to start the first question…</p>
  </div>

  <!-- Active question -->
  <div id="screen-question" style="display:none">
    <div class="q-progress" id="q-progress"></div>
    <div id="question-title"></div>
    <div id="options-list"></div>
    <div class="vote-feedback hidden" id="vote-feedback"></div>
  </div>

  <!-- Live results (shown immediately after voting) -->
  <div id="screen-results" style="display:none">
    <div class="results-progress" id="results-progress"></div>
    <div class="results-q-title" id="results-q-title"></div>
    <div id="results-bars"></div>
    <div class="results-footer">
      <div class="results-total" id="results-total"></div>
      <button class="btn-change-vote" id="change-vote-btn">Change my vote</button>
      <div class="locked-results-msg" id="locked-results-msg" style="display:none">🔒 Voting is closed</div>
    </div>
  </div>

</main>

<div id="reconnect-banner"><div class="spinner"></div> Reconnecting…</div>

<script>
// ── Client identity ───────────────────────────────────────────────────────────
let clientId = localStorage.getItem('pollClientId');
if (!clientId) {
  clientId = `${Date.now().toString(36)}-${Math.random().toString(36).slice(2,9)}`;
  localStorage.setItem('pollClientId', clientId);
}

let deviceFingerprint = null;

async function buildFingerprint() {
  const parts = [
    navigator.userAgent,
    navigator.language + ',' + (navigator.languages || []).join(','),
    `${screen.width}x${screen.height}x${screen.colorDepth}`,
    Intl.DateTimeFormat().resolvedOptions().timeZone,
    String(navigator.hardwareConcurrency || ''),
    String(navigator.deviceMemory || ''),
    navigator.platform || '',
  ];
  try {
    const c = document.createElement('canvas');
    c.width = 240; c.height = 60;
    const ctx = c.getContext('2d');
    ctx.textBaseline = 'alphabetic';
    ctx.fillStyle = '#f60'; ctx.fillRect(100, 1, 62, 20);
    ctx.fillStyle = '#069'; ctx.font = '11pt Arial';
    ctx.fillText('CharityPoll \u{1F389}', 2, 15);
    ctx.fillStyle = 'rgba(102,204,0,0.7)'; ctx.font = '18pt Arial';
    ctx.fillText('2026', 4, 50);
    parts.push(c.toDataURL());
  } catch {}
  const str = parts.join('|||');
  try {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('').slice(0, 24);
  } catch {
    let h = 5381;
    for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
    return 'fb' + (h >>> 0).toString(16).padStart(8, '0');
  }
}

// ── State ─────────────────────────────────────────────────────────────────────
let socket          = null;
let joined          = false;
let publicState     = null;
let myVotes         = {};
let activeQuestion  = null;
let currentRoomCode = null;
let currentScreen   = 'code';
let resultsQId      = null; // which question the results screen is built for

// ── DOM refs ──────────────────────────────────────────────────────────────────
const screenCode     = document.getElementById('screen-code');
const screenWaiting  = document.getElementById('screen-waiting');
const screenQuestion = document.getElementById('screen-question');
const screenResults  = document.getElementById('screen-results');
const codeInput      = document.getElementById('code-input');
const codeError      = document.getElementById('code-error');
const joinBtn        = document.getElementById('join-btn');
const questionTitle  = document.getElementById('question-title');
const optionsList    = document.getElementById('options-list');
const voteFeedback   = document.getElementById('vote-feedback');
const reconnBanner   = document.getElementById('reconnect-banner');
const roomChip       = document.getElementById('room-chip');
const roomCodeDisp   = document.getElementById('room-code-display');
const qProgress      = document.getElementById('q-progress');
const resultsProgress = document.getElementById('results-progress');
const resultsQTitle  = document.getElementById('results-q-title');
const resultsBars    = document.getElementById('results-bars');
const resultsTotal   = document.getElementById('results-total');
const changeVoteBtn  = document.getElementById('change-vote-btn');
const lockedResultsMsg = document.getElementById('locked-results-msg');

// ── Init ──────────────────────────────────────────────────────────────────────
(async function init() {
  const [fp, cfg] = await Promise.allSettled([
    buildFingerprint(),
    fetch('/api/config').then(r => r.json()),
  ]);
  if (fp.status === 'fulfilled')  deviceFingerprint = fp.value;
  if (cfg.status === 'fulfilled') {
    applyTheme(cfg.value.event);
    currentRoomCode = cfg.value.roomCode;
  }
  const params = new URLSearchParams(location.search);
  const urlCode = params.get('code');
  if (urlCode) { codeInput.value = urlCode.toUpperCase(); handleJoin(); }
})();

function applyTheme(ev) {
  const r = document.documentElement.style;
  if (ev.primaryColor) r.setProperty('--primary', ev.primaryColor);
  if (ev.accentColor)  r.setProperty('--accent',  ev.accentColor);
  if (ev.bgColor)      r.setProperty('--bg',       ev.bgColor);
  if (ev.darkColor)    r.setProperty('--dark',     ev.darkColor);
  if (ev.name) { document.getElementById('event-name').textContent = ev.name; document.title = `Vote — ${ev.name}`; }
  if (ev.logoUrl) { const l = document.getElementById('header-logo'); l.src = ev.logoUrl; l.style.display = 'block'; }
}

// ── Join flow ─────────────────────────────────────────────────────────────────
joinBtn.addEventListener('click', handleJoin);
codeInput.addEventListener('keydown', e => { if (e.key === 'Enter') joinBtn.click(); });
codeInput.addEventListener('input', () => {
  codeInput.value = codeInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
});

function handleJoin() {
  const entered = codeInput.value.trim().toUpperCase();
  if (entered.length < 4) { codeError.textContent = 'Please enter your room code.'; return; }
  if (currentRoomCode && entered !== currentRoomCode) {
    codeError.textContent = 'Room code not found. Check the screen and try again.'; return;
  }
  codeError.textContent = '';
  connectSocket();
}

function connectSocket() {
  joined = false;
  socket = io({ reconnectionAttempts: Infinity });

  socket.on('connect', () => {
    reconnBanner.classList.remove('visible');
    socket.emit('check-votes', { clientId, fingerprint: deviceFingerprint });
    if (joined) renderCurrentState();
  });

  socket.on('disconnect', () => reconnBanner.classList.add('visible'));
  socket.on('reconnect',  () => reconnBanner.classList.remove('visible'));

  socket.on('state', (state) => {
    publicState = state;
    currentRoomCode = state.roomCode;
    roomCodeDisp.textContent = state.roomCode;
    roomChip.style.display = 'inline-block';

    if (!joined) { joined = true; showScreen('waiting'); }

    activeQuestion = state.questions.find(q => q.id === state.activeQuestionId) || null;
    renderCurrentState();
  });

  socket.on('vote-history', ({ votes }) => {
    myVotes = votes;
    renderCurrentState();
  });

  socket.on('question-changed', ({ activeQuestionId, question }) => {
    activeQuestion = question || null;
    // Reset results screen binding when question changes
    if (!activeQuestion || (resultsQId && activeQuestion.id !== resultsQId)) {
      resultsQId = null;
    }
    renderCurrentState();
  });

  socket.on('vote-update', ({ questionId, votes, totalVotes }) => {
    if (activeQuestion && activeQuestion.id === questionId) {
      activeQuestion.votes = votes;
      activeQuestion.totalVotes = totalVotes;
    }
    if (publicState) {
      const q = publicState.questions.find(q => q.id === questionId);
      if (q) { q.votes = votes; q.totalVotes = totalVotes; }
    }
    if (currentScreen === 'results' && activeQuestion?.id === questionId) {
      updateResultBars();
    }
  });

  socket.on('question-locked', ({ questionId, locked }) => {
    if (activeQuestion && activeQuestion.id === questionId) {
      activeQuestion.locked = locked;
      if (currentScreen === 'question') renderQuestion();
      if (currentScreen === 'results')  renderLockedState();
    }
  });

  socket.on('vote-error', ({ message }) => {
    voteFeedback.textContent = `⚠ ${message}`;
    voteFeedback.classList.remove('hidden');
    voteFeedback.style.color = '#dc2626';
  });
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderCurrentState() {
  if (!joined) return;
  if (!activeQuestion) { showScreen('waiting'); return; }

  // If user already voted on this question, show results
  if (myVotes[activeQuestion.id] !== undefined) {
    showScreen('results');
    renderResults();
    return;
  }

  showScreen('question');
  renderQuestion();
}

function showScreen(name) {
  currentScreen = name;
  screenCode.style.display     = name === 'code'     ? 'block' : 'none';
  screenWaiting.style.display  = name === 'waiting'  ? 'block' : 'none';
  screenQuestion.style.display = name === 'question' ? 'block' : 'none';
  screenResults.style.display  = name === 'results'  ? 'block' : 'none';
}

function renderQuestion() {
  if (!activeQuestion) return;

  questionTitle.textContent = activeQuestion.title;
  if (publicState) {
    const qs  = publicState.questions;
    const idx = qs.findIndex(q => q.id === activeQuestion.id);
    if (idx >= 0) qProgress.textContent = `Question ${idx + 1} of ${qs.length}`;
  }

  const myVoteIdx = myVotes[activeQuestion.id];
  const isLocked  = activeQuestion.locked;

  optionsList.innerHTML = '';
  activeQuestion.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn' + (i === myVoteIdx ? ' selected' : '');
    btn.disabled  = isLocked && i !== myVoteIdx;
    const icon = document.createElement('span');
    icon.className = 'check-icon';
    icon.textContent = i === myVoteIdx ? '✓' : '';
    btn.appendChild(icon);
    btn.appendChild(document.createTextNode(opt));
    btn.addEventListener('click', () => castVote(i));
    optionsList.appendChild(btn);
  });

  const existing = optionsList.querySelector('.locked-badge-inline');
  if (existing) existing.remove();
  if (isLocked) {
    const badge = document.createElement('div');
    badge.className = 'locked-badge-inline';
    badge.textContent = '🔒 Voting is closed for this question';
    optionsList.appendChild(badge);
  }

  if (myVoteIdx !== undefined) {
    voteFeedback.textContent = `✓ You voted for "${activeQuestion.options[myVoteIdx]}"`;
    voteFeedback.style.color = '';
    voteFeedback.classList.remove('hidden');
  } else {
    voteFeedback.classList.add('hidden');
  }
}

// ── Results screen ────────────────────────────────────────────────────────────
function renderResults() {
  if (!activeQuestion) return;
  const q = activeQuestion;

  // Update header
  if (publicState) {
    const idx = publicState.questions.findIndex(x => x.id === q.id);
    resultsProgress.textContent = idx >= 0 ? `Question ${idx+1} of ${publicState.questions.length}` : '';
  }
  resultsQTitle.textContent = q.title;

  // Rebuild bar rows when entering this question for the first time
  if (q.id !== resultsQId) {
    resultsQId = q.id;
    resultsBars.innerHTML = '';
    q.options.forEach((opt, i) => {
      const isMyVote = i === myVotes[q.id];
      const row = document.createElement('div');
      row.className = 'result-row';
      row.dataset.i = i;
      row.innerHTML = `
        <div class="result-row-header">
          <span class="result-label">
            ${isMyVote ? '<span class="my-check">✓</span>' : ''}
            <span class="opt-text">${escHtml(opt)}</span>
          </span>
          <span class="result-pct">0%</span>
        </div>
        <div class="result-track">
          <div class="result-fill${isMyVote ? ' my-vote' : ''}" style="width:0%"></div>
        </div>`;
      resultsBars.appendChild(row);
    });
    // Animate bars in on next paint
    requestAnimationFrame(() => requestAnimationFrame(() => updateResultBars()));
  } else {
    updateResultBars();
  }

  renderLockedState();
}

function updateResultBars() {
  if (!activeQuestion) return;
  const q = activeQuestion;
  const myVoteIdx = myVotes[q.id];
  const total = q.totalVotes ?? Object.values(q.votes).reduce((a,b)=>a+b,0);

  q.options.forEach((opt, i) => {
    const row = resultsBars.querySelector(`[data-i="${i}"]`);
    if (!row) return;
    const count   = q.votes[opt] || 0;
    const pct     = total > 0 ? Math.round(count / total * 100) : 0;
    const isMyVote = i === myVoteIdx;

    const fill   = row.querySelector('.result-fill');
    const pctEl  = row.querySelector('.result-pct');
    const label  = row.querySelector('.result-label');

    if (fill) {
      fill.style.width = pct + '%';
      fill.classList.toggle('my-vote', isMyVote);
    }
    if (pctEl) pctEl.textContent = pct + '%';

    // Sync check mark
    const checkEl = label?.querySelector('.my-check');
    if (isMyVote && !checkEl && label) {
      const span = document.createElement('span');
      span.className = 'my-check'; span.textContent = '✓';
      label.prepend(span);
    } else if (!isMyVote && checkEl) {
      checkEl.remove();
    }
  });

  resultsTotal.textContent = `${total} vote${total !== 1 ? 's' : ''}`;
}

function renderLockedState() {
  if (!activeQuestion) return;
  const locked = activeQuestion.locked;
  changeVoteBtn.disabled = locked;
  lockedResultsMsg.style.display = locked ? 'block' : 'none';
}

// ── Voting ────────────────────────────────────────────────────────────────────
function castVote(optionIndex) {
  if (!activeQuestion || activeQuestion.locked) return;

  // Optimistic update
  myVotes[activeQuestion.id] = optionIndex;
  resultsQId = null; // force rebuild of results bars for this vote
  showScreen('results');
  renderResults();

  socket.emit('vote', {
    questionId:  activeQuestion.id,
    optionIndex,
    clientId,
    fingerprint: deviceFingerprint,
  });
}

// ── Change vote ───────────────────────────────────────────────────────────────
changeVoteBtn.addEventListener('click', () => {
  if (!activeQuestion || activeQuestion.locked) return;
  showScreen('question');
  renderQuestion();
});

// ── Util ──────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>
